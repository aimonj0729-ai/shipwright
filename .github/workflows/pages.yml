name: Deploy Shipwright Web

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check JavaScript syntax
        run: node --check site/app.js

      - name: Smoke test static site
        run: |
          python3 -m http.server 4173 --directory site &
          server_pid=$!
          trap 'kill $server_pid' EXIT
          sleep 2
          curl --fail --silent http://127.0.0.1:4173/ | grep "Analyze launch risk"
          curl --fail --head --silent http://127.0.0.1:4173/styles.css >/dev/null
          curl --fail --head --silent http://127.0.0.1:4173/app.js >/dev/null

  deploy:
    needs: smoke
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
